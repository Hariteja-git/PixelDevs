<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelDevs: AI Agency</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <aside class="sidebar">
        <div class="brand">
            <span class="icon"></span> PixelDevs
        </div>
        <nav>
            <div class="nav-item active"> Mission Control</div>
        </nav>
        <div class="status-panel">
            <div class="status-item"><span class="dot green"></span> AI Brain: Online</div>
            <div class="status-item"><span class="dot yellow"></span> DB: Local</div>
        </div>
    </aside>

    
    <main class="main-content">
        
        
        <header class="control-deck">
            <div class="input-group">
                <label>Project Requirement</label>
                <input type="text" id="taskInput" placeholder="E.g., Create a calculator in Python">
            </div>
            <div class="input-group">
                <label>Language</label>
                <select id="langInput">
                    <option value="Python">Python</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="Java">Java</option>
                    <option value="C++">C++</option>
                </select>
            </div>
            <button id="startBtn" onclick="startProcess()">
              <svg height="24" width="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M0 0h24v24H0z" fill="none"></path>
                <path d="M5 13c0-5.088 2.903-9.436 7-11.182C16.097 3.564 19 7.912 19 13c0 .823-.076 1.626-.22 2.403l1.94 1.832a.5.5 0 0 1 .095.603l-2.495 4.575a.5.5 0 0 1-.793.114l-2.234-2.234a1 1 0 0 0-.707-.293H9.414a1 1 0 0 0-.707.293l-2.234 2.234a.5.5 0 0 1-.793-.114l-2.495-4.575a.5.5 0 0 1 .095-.603l1.94-1.832C5.077 14.626 5 13.823 5 13zm1.476 6.696l.817-.817A3 3 0 0 1 9.414 18h5.172a3 3 0 0 1 2.121.879l.817.817.982-1.8-1.1-1.04a2 2 0 0 1-.593-1.82c.124-.664.187-1.345.187-2.036 0-3.87-1.995-7.3-5-8.96C8.995 5.7 7 9.13 7 13c0 .691.063 1.372.187 2.037a2 2 0 0 1-.593 1.82l-1.1 1.039.982 1.8zM12 13a2 2 0 1 1 0-4 2 2 0 0 1 0 4z" fill="currentColor"></path>
              </svg>
              <span>Initialize Agents</span>
            </button>
        </header>

        
        <section class="stage-wrapper">
            <div class="office-container">
                
                <div class="agent-wrapper" id="agent-Supervisor" style="top: 15%; left: 15%;">
                    <div class="chat-bubble">Planning task...</div>
                    <img src="supervisor.png" class="avatar" alt="Supervisor">
                    <div class="terminal-popup right-side">
                        <div class="term-header">
                            <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
                            <span class="title">sup_cli</span>
                        </div>
                        <div class="term-body" id="log-Supervisor">Waiting...</div>
                    </div>
                </div>

                
                <div class="agent-wrapper" id="agent-Developer" style="bottom: 15%; left: 15%;">
                    <div class="chat-bubble">Writing code...</div>
                    <img src="developer.png" class="avatar" alt="Developer">
                    <div class="terminal-popup right-side">
                        <div class="term-header">
                            <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
                            <span class="title">dev_env</span>
                        </div>
                        <div class="term-body" id="log-Developer">Waiting...</div>
                    </div>
                </div>

                
                <div class="agent-wrapper" id="agent-Reviewer" style="top: 15%; right: 15%;">
                    <div class="chat-bubble">Checking logic...</div>
                    <img src="reviewer.png" class="avatar" alt="Reviewer">
                    <div class="terminal-popup left-side">
                        <div class="term-header">
                            <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
                            <span class="title">rev_tool</span>
                        </div>
                        <div class="term-body" id="log-Reviewer">Waiting...</div>
                    </div>
                </div>

                
                <div class="agent-wrapper" id="agent-Tester" style="bottom: 15%; right: 15%;">
                    <div class="chat-bubble">Running tests...</div>
                    <img src="tester.png" class="avatar" alt="Tester">
                    <div class="terminal-popup left-side">
                        <div class="term-header">
                            <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
                            <span class="title">qa_logs</span>
                        </div>
                        <div class="term-body" id="log-Tester">Waiting...</div>
                    </div>
                </div>

            </div>
        </section>

        
        <section class="output-deck" id="outputDeck" style="display: none;">
            <div class="output-header">
                <h3>✅ Generated Artifact</h3>
                <button onclick="downloadCode()" class="secondary-btn">📥 Download File</button>
            </div>
            <pre><code id="finalCode">Waiting for output...</code></pre>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
